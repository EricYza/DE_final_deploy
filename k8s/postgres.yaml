apiVersion: v1
kind: ConfigMap
metadata:
  name: climate-postgres-init
  namespace: climate-stable
data:
  init.sql: |
    CREATE DATABASE airflow_meta;
    GRANT ALL PRIVILEGES ON DATABASE airflow_meta TO climate_user;
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: climate-stable-postgres-pv
  labels:
    app: climate-postgres
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: climate-stable-postgres
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /var/data/climate-stable/postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: climate-postgres-pvc
  namespace: climate-stable
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: climate-stable-postgres
  resources:
    requests:
      storage: 10Gi
  selector:
    matchLabels:
      app: climate-postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: climate-postgres
  namespace: climate-stable
  labels:
    app: climate-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: climate-postgres
  template:
    metadata:
      labels:
        app: climate-postgres
    spec:
      nodeSelector:
        node-role.kubernetes.io/storage: ""
      containers:
        - name: postgres
          image: localhost:32000/postgres:16-bookworm
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: climate-stable-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: climate-stable-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: climate-stable-secrets
                  key: POSTGRES_DB
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: climate-postgres-pvc
        - name: init-sql
          configMap:
            name: climate-postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: climate-postgres
  namespace: climate-stable
spec:
  type: NodePort
  selector:
    app: climate-postgres
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 31462
