apiVersion: v1
kind: ConfigMap
metadata:
  name: climate-airflow-config
  namespace: climate-stable
data:
  AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
  AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  AIRFLOW__CORE__DAGS_FOLDER: "/opt/airflow/dags"
  AIRFLOW__CORE__DEFAULT_TIMEZONE: "UTC"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
  AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "60"
  PYTHONPATH: "/opt/airflow"

  MINIO_ENDPOINT: "climate-minio:9000"
  MINIO_USE_SSL: "false"
  POSTGRES_HOST: "climate-postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "climate_analytics"

  TARGET_LOCATION_IDS: "durham_nc,london_uk,tokyo_jp,sydney_au,cairo_eg"
  API_MAX_RETRIES: "5"
  API_RETRY_BASE_DELAY: "5"
  API_REQUEST_TIMEOUT: "60"
  API_RATE_LIMIT_DELAY: "1.5"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: climate-airflow
  namespace: climate-stable
  labels:
    app: climate-airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: climate-airflow
  template:
    metadata:
      labels:
        app: climate-airflow
    spec:
      nodeSelector:
        node-role.kubernetes.io/compute: ""
      initContainers:
        - name: airflow-db-migrate
          image: localhost:32000/climate-airflow-stable:latest
          imagePullPolicy: Always
          command: ["bash", "-lc", "airflow db migrate"]
          envFrom:
            - configMapRef:
                name: climate-airflow-config
            - secretRef:
                name: climate-stable-secrets
        - name: airflow-create-admin
          image: localhost:32000/climate-airflow-stable:latest
          imagePullPolicy: Always
          command:
            [
              "bash",
              "-lc",
              "airflow users create --username \"$AIRFLOW_ADMIN_USERNAME\" --firstname Climate --lastname Admin --role Admin --email \"$AIRFLOW_ADMIN_EMAIL\" --password \"$AIRFLOW_ADMIN_PASSWORD\" || true",
            ]
          envFrom:
            - configMapRef:
                name: climate-airflow-config
            - secretRef:
                name: climate-stable-secrets
      containers:
        - name: airflow-webserver
          image: localhost:32000/climate-airflow-stable:latest
          imagePullPolicy: Always
          command: ["airflow", "webserver", "--port", "8080"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: climate-airflow-config
            - secretRef:
                name: climate-stable-secrets
          volumeMounts:
            - name: logs
              mountPath: /opt/airflow/logs
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "750m"
              memory: "1Gi"
        - name: airflow-scheduler
          image: localhost:32000/climate-airflow-stable:latest
          imagePullPolicy: Always
          command: ["airflow", "scheduler"]
          envFrom:
            - configMapRef:
                name: climate-airflow-config
            - secretRef:
                name: climate-stable-secrets
          volumeMounts:
            - name: logs
              mountPath: /opt/airflow/logs
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
      volumes:
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: climate-airflow
  namespace: climate-stable
spec:
  type: NodePort
  selector:
    app: climate-airflow
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 31280
