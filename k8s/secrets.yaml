apiVersion: v1
kind: Secret
metadata:
  name: climate-stable-secrets
  namespace: climate-stable
type: Opaque
stringData:
  POSTGRES_USER: "climate_user"
  POSTGRES_PASSWORD: "change-me-climate-password"
  POSTGRES_DB: "climate_analytics"

  AIRFLOW_DB: "airflow_meta"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://climate_user:change-me-climate-password@climate-postgres:5432/airflow_meta"
  AIRFLOW__CORE__FERNET_KEY: ""
  AIRFLOW__WEBSERVER__SECRET_KEY: "replace-with-a-long-random-webserver-secret"
  AIRFLOW_ADMIN_USERNAME: "admin"
  AIRFLOW_ADMIN_PASSWORD: "change-me-admin-password"
  AIRFLOW_ADMIN_EMAIL: "admin@example.com"

  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "change-me-minio-password"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "change-me-minio-password"
